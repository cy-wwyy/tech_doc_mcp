# 搜索评测集 —— 混合检索质量的“真值”
#
# 每条:query(自然语言) + keywords(Agent 会传的精确词) + gold(期望命中的页面 path)。
# gold 为人工起草、可审计;网格搜索用它算 nDCG@10 / MRR / Recall@5,LLM-judge 独立复核。
# 设计覆盖:单关键词、多关键词、以及“关键词在代码里高频”的对抗样本(验证饱和+boost-only 不被污染)。
#
# 改动本文件后需清 eval/.cache/。

- source: fastapi
  version: "0.139.0"
  query: "如何在依赖里获取当前登录用户"
  keywords: ["Depends", "OAuth2"]
  gold: ["tutorial/security/get-current-user.md", "tutorial/security/simple-oauth2.md"]

